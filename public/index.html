<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crane Call</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background-color: #0a0a0a;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;

    background-image:
        radial-gradient(circle at 20% 30%, rgba(255,0,127,0.1), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(157,0,255,0.1), transparent 40%);
}

.container {
    text-align:center;
    animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {
    from { opacity:0; transform:scale(0.9); }
    to { opacity:1; transform:scale(1); }
}

/* верхний текст */
.status {
    font-size:18px;
    color:#B0B0B0;
    margin-bottom:20px;
    letter-spacing:1px;
}

/* логотип */
.logo-container {
    width:140px;
    height:140px;
    margin:0 auto 24px;
    border-radius:30px;
    overflow:hidden;

    background: linear-gradient(135deg, rgba(255,0,127,0.2), rgba(157,0,255,0.2));
    display:flex;
    align-items:center;
    justify-content:center;

    animation: glow 2s ease-in-out infinite;
}

.logo-container img {
    width:100%;
    height:100%;
    object-fit:cover;
    animation: pulse 3s ease-in-out infinite;
}

@keyframes glow {
    0%,100% {
        box-shadow: 0 20px 60px rgba(255,0,127,0.3),
                    0 0 80px rgba(157,0,255,0.2);
    }
    50% {
        box-shadow: 0 20px 80px rgba(255,0,127,0.5),
                    0 0 120px rgba(157,0,255,0.4);
    }
}

@keyframes pulse {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.05); }
}

/* название */
h1 {
    font-size:28px;
    font-weight:800;
    margin-bottom:10px;

    background: linear-gradient(135deg, #FF007F, #9D00FF);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* прогресс */
.progress {
    width:200px;
    height:4px;
    background: rgba(255,255,255,0.1);
    border-radius:2px;
    margin:20px auto;
    overflow:hidden;
}

.progress-fill {
    height:100%;
    width:0%;
    background: linear-gradient(90deg, #FF007F, #9D00FF);
    animation: load 2.5s ease-out forwards;
}

@keyframes load {
    from { width:0%; }
    to { width:100%; }
}

/* точки */
.dots {
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:10px;
}

.dot {
    width:8px;
    height:8px;
    border-radius:50%;
    background:#FF007F;
    animation: bounce 1.4s infinite;
}

.dot:nth-child(2){ animation-delay:0.2s; }
.dot:nth-child(3){ animation-delay:0.4s; }

@keyframes bounce {
    0%,80%,100% { transform:scale(0.6); opacity:0.5; }
    40% { transform:scale(1); opacity:1; }
}
</style>
</head>

<body>

<div class="container">

    <div class="status">Соединение...</div>

    <div class="logo-container">
        <img src="crane.png" alt="Crane">
    </div>

    <h1>Crane Call</h1>

    <div class="progress">
        <div class="progress-fill"></div>
    </div>

    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

</div>

<script>
// автоматический переход на звонок
setTimeout(() => {
    window.location.href = "call.html";
}, 2500);
</script>

</body>
</html>
