<script src="/socket.io/socket.io.js"></script>
<script>
let socket = null;
let currentUser = null;
let peerConnection = null;
let localStream = null;
let currentCall = null;
let callState = "idle"; // idle | calling | incoming | in-call

const authContainer = document.getElementById('authContainer');
const appContainer = document.getElementById('appContainer');
const registerBtn = document.getElementById('registerBtn');
const contactsList = document.getElementById('contactsList');

/* =========================
   INIT
========================= */
window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('currentUser');

    if (saved) {
        try {
            currentUser = JSON.parse(saved);

            authContainer.classList.add('hidden');
            appContainer.classList.remove('hidden');

            document.getElementById('currentUserName').textContent = currentUser.username;
            document.getElementById('userAvatar').textContent = currentUser.username[0].toUpperCase();

            connectSocket();
        } catch {
            localStorage.removeItem('currentUser');
        }
    }
});

function connectSocket() {
    socket = io();

    socket.on('connect', () => {
        socket.emit('register', currentUser);
    });

    setupSocket();
}

/* =========================
   REGISTER
========================= */
let isRegistering = false;

registerBtn.onclick = async () => {
    if (isRegistering) return;

    const username = regUsername.value.trim();
    const userId = regUserId.value.trim();

    if (!username || !userId) return alert("Заполните поля");

    isRegistering = true;
    registerBtn.textContent = "Загрузка...";

    try {
        const res = await fetch('/api/register', {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({username,userId})
        });

        let data = null;
        try { data = await res.json(); } catch {}

        if (!res.ok) throw new Error(data?.message || "Ошибка");

        currentUser = {username,userId};
        localStorage.setItem('currentUser', JSON.stringify(currentUser));

        authContainer.classList.add('hidden');
        appContainer.classList.remove('hidden');

        document.getElementById('currentUserName').textContent = username;
        document.getElementById('userAvatar').textContent = username[0].toUpperCase();

        connectSocket();

    } catch (e) {
        alert(e.message);
    }

    isRegistering = false;
    registerBtn.textContent = "Зарегистрироваться";
};

/* =========================
   SOCKET
========================= */
function setupSocket() {

    socket.on("user-list", users => {
        renderContacts(users.filter(u => u.userId !== currentUser.userId));
    });

    socket.on("incoming-call", data => {
        showIncomingCall(data);
    });

    socket.on("offer", handleOffer);

    socket.on("answer", async data => {
        if (peerConnection) {
            await peerConnection.setRemoteDescription(
                new RTCSessionDescription(data.answer)
            );
        }
    });

    socket.on("ice-candidate", async data => {
        if (peerConnection) {
            await peerConnection.addIceCandidate(
                new RTCIceCandidate(data.candidate)
            );
        }
    });

    socket.on("call-ended", endCall);
}

/* =========================
   CONTACTS UI
========================= */
function renderContacts(users) {
    contactsList.innerHTML = "";

    users.forEach(u => {
        const el = document.createElement("div");
        el.className = "contact-item";

        el.innerHTML = `
            <div class="contact-avatar">${u.username[0]}</div>
            <div class="contact-info">
                <div class="contact-name">${u.username}</div>
                <div class="contact-status">online</div>
            </div>

            <div class="call-buttons">
                <button class="call-btn" onclick="makeCall('${u.userId}','video')">📹</button>
            </div>
        `;

        contactsList.appendChild(el);
    });
}

/* =========================
   CALL UI SYSTEM (HTML IN JS + ANIMATION)
========================= */

function showCallUI(type, name) {

    const html = `
    <div id="callUI" class="call-overlay show">

        <div class="call-window">

            <div class="call-header">
                <div class="pulse-ring"></div>
                <h2>${name || "Звонок..."}</h2>
                <p>${type === "video" ? "Видео звонок" : "Аудио звонок"}</p>
            </div>

            <div class="video-area">
                <video class="remote-video" autoplay></video>
                <video class="local-video" autoplay muted></video>
            </div>

            <div class="call-controls">

                <button class="btn mute" onclick="toggleMute()">🎤</button>
                <button class="btn video" onclick="toggleVideo()">📹</button>
                <button class="btn end" onclick="endCall()">❌</button>

            </div>

        </div>
    </div>
    `;

    document.body.insertAdjacentHTML("beforeend", html);
    callState = "in-call";
}

/* =========================
   INCOMING CALL
========================= */

function showIncomingCall(data) {

    const html = `
    <div id="incomingCall" class="incoming-call show">

        <div class="incoming-box">

            <h3>📞 Входящий звонок</h3>
            <p>${data.from}</p>

            <div class="incoming-actions">
                <button class="accept" onclick="acceptCall()">✔</button>
                <button class="reject" onclick="rejectCall()">❌</button>
            </div>

        </div>

    </div>
    `;

    document.body.insertAdjacentHTML("beforeend", html);

    callState = "incoming";
}

function acceptCall() {
    socket.emit("accept-call", currentCall);
    document.getElementById("incomingCall")?.remove();
}

function rejectCall() {
    socket.emit("reject-call", currentCall);
    document.getElementById("incomingCall")?.remove();
}

/* =========================
   WEBRTC
========================= */

async function makeCall(targetId, type) {

    currentCall = {targetId,type};

    localStream = await navigator.mediaDevices.getUserMedia({
        video: type === "video",
        audio: true
    });

    peerConnection = createPeer(targetId);

    localStream.getTracks().forEach(t =>
        peerConnection.addTrack(t, localStream)
    );

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    socket.emit("offer", {targetId,offer});

    showCallUI(type, "Calling...");
}

function createPeer(targetId) {

    const pc = new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    pc.onicecandidate = e => {
        if (e.candidate) {
            socket.emit("ice-candidate", {
                targetId,
                candidate: e.candidate
            });
        }
    };

    pc.ontrack = e => {
        const remote = document.querySelector(".remote-video");
        if (remote) remote.srcObject = e.streams[0];
    };

    return pc;
}

async function handleOffer(data) {

    currentCall = data;

    peerConnection = createPeer(data.from);

    localStream = await navigator.mediaDevices.getUserMedia({
        video:true,
        audio:true
    });

    localStream.getTracks().forEach(t =>
        peerConnection.addTrack(t, localStream)
    );

    await peerConnection.setRemoteDescription(
        new RTCSessionDescription(data.offer)
    );

    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    socket.emit("answer", {
        targetId:data.from,
        answer
    });

    showCallUI("video", data.from);
}

/* =========================
   CALL CONTROL
========================= */

function endCall() {

    document.getElementById("callUI")?.remove();

    peerConnection?.close();
    peerConnection = null;

    localStream?.getTracks().forEach(t => t.stop());
    localStream = null;

    callState = "idle";
}

/* =========================
   ANIMATION PLACEHOLDER (CSS expected)
========================= */

function toggleMute(){}
function toggleVideo(){}

</script>
