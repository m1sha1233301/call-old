<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Secure Call · Glass</title>
  <!-- Font Awesome Icons (CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #0b0a0c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated deep gradient background (subtle) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(168, 85, 247, 0.18) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.18) 0%, transparent 45%),
                  #0b0a0c;
      z-index: -2;
      animation: breathe 12s ease-in-out infinite alternate;
    }

    /* extra floating soft glow */
    body::after {
      content: '';
      position: fixed;
      top: 20%;
      left: 10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%);
      filter: blur(80px);
      z-index: -1;
      animation: drift 18s infinite alternate ease-in-out;
    }

    @keyframes breathe {
      0% { opacity: 0.8; }
      100% { opacity: 1; }
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 5%) scale(1.2); }
    }

    .app-container {
      max-width: 1280px;
      width: 100%;
      height: 90vh;
      max-height: 900px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px);
    }

    /* ----- TOP SECTION (glass) ----- */
    .call-header {
      padding: 18px 24px 12px 24px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      background: rgba(20, 15, 25, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 48px 48px 28px 28px;
      margin-bottom: 16px;
      border: 0.5px solid rgba(168, 85, 247, 0.2);
      box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(236, 72, 153, 0.1) inset;
    }

    .title-group {
      display: flex;
      flex-direction: column;
    }

    .title-main {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c084fc 0%, #f472b6 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(168, 85, 247, 0.5);
    }

    .title-sub {
      font-size: 0.9rem;
      font-weight: 400;
      color: rgba(220, 210, 240, 0.8);
      letter-spacing: 0.3px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .title-sub i {
      font-size: 10px;
      color: #a855f7;
      text-shadow: 0 0 10px #a855f7;
    }

    .encryption-badge {
      background: rgba(30, 20, 40, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 40px;
      border: 0.5px solid rgba(236, 72, 153, 0.25);
      box-shadow: 0 8px 20px -8px #00000066;
    }

    .encryption-badge span {
      font-size: 0.85rem;
      font-weight: 500;
      color: #e2d5f5;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .encryption-badge i {
      color: #a855f7;
      filter: drop-shadow(0 0 8px #c084fc);
    }

    /* ----- CENTER VIDEO AREA (glass + glow) ----- */
    .video-stage {
      flex: 1;
      position: relative;
      border-radius: 40px;
      overflow: hidden;
      margin-bottom: 20px;
      background: #0d0912;
      box-shadow: 0 25px 40px -12px #000000cc, 0 0 0 1px rgba(168, 85, 247, 0.25), 0 0 40px rgba(168, 85, 247, 0.15);
      transition: box-shadow 0.3s;
      backdrop-filter: blur(2px);
    }

    .video-stage:hover {
      box-shadow: 0 30px 50px -12px #000000, 0 0 0 1.5px rgba(236, 72, 153, 0.4), 0 0 60px rgba(236, 72, 153, 0.2);
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #0b0710;
      display: block;
      border-radius: 40px;
    }

    /* local video PIP — glassmorphism card */
    .local-video-wrapper {
      position: absolute;
      bottom: 22px;
      right: 22px;
      width: 170px;
      max-width: 28%;
      aspect-ratio: 4 / 3;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(20, 12, 30, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.2px solid rgba(236, 72, 153, 0.35);
      box-shadow: 0 18px 30px -8px #000000b3, 0 0 0 0.5px rgba(168,85,247,0.4), 0 0 20px #a855f740;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
      transform: scale(1);
    }

    .local-video-wrapper:hover {
      transform: scale(1.02);
      border-color: #c084fc;
      box-shadow: 0 22px 35px -8px #000, 0 0 0 1.5px #ec4899, 0 0 30px #ec489950;
    }

    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 24px;
    }

    /* small mic/cam status indicators (kept minimal) — no JS change, just style */
    .pip-label {
      position: absolute;
      top: 10px;
      left: 12px;
      background: rgba(10, 5, 18, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #f0e6ff;
      border: 0.3px solid rgba(236, 72, 153, 0.3);
      pointer-events: none;
    }

    /* ----- BOTTOM CONTROLS (glass panel) ----- */
    .controls-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 16px 28px;
      background: rgba(20, 13, 28, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 60px;
      border: 0.5px solid rgba(168, 85, 247, 0.35);
      box-shadow: 0 20px 40px -8px #000000, 0 0 0 1px rgba(236, 72, 153, 0.15) inset;
      margin-top: 4px;
      transition: box-shadow 0.2s;
    }

    .ctrl-btn {
      width: 68px;
      height: 68px;
      border-radius: 40px;
      background: rgba(20, 12, 28, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #f0e2ff;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 18px -6px #00000099, 0 0 0 1px rgba(168,85,247,0.3), 0 0 10px #a855f720;
      border: 0.8px solid rgba(236, 72, 153, 0.25);
    }

    .ctrl-btn i {
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.2));
      transition: transform 0.15s;
    }

    .ctrl-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 24px -8px black, 0 0 0 2px #a855f7, 0 0 30px #ec4899;
      border-color: #ec4899;
      background: rgba(40, 20, 55, 0.8);
    }

    .ctrl-btn:hover i {
      transform: scale(1.05);
    }

    /* gradient variants for call / end */
    .call-start {
      background: linear-gradient(145deg, #1f8a4b, #0f6e3a);
      box-shadow: 0 8px 22px -6px #0a331a, 0 0 0 1.5px #4ade80, 0 0 25px #22c55e;
      color: white;
      border: none;
    }

    .call-start:hover {
      background: linear-gradient(145deg, #22a85a, #158747);
      box-shadow: 0 12px 28px -6px #0f3d22, 0 0 0 3px #86efac, 0 0 40px #4ade80;
    }

    .call-end {
      background: linear-gradient(145deg, #c72a2a, #a11b1b);
      box-shadow: 0 8px 22px -6px #3d0f0f, 0 0 0 1.5px #f87171, 0 0 25px #ef4444;
      color: white;
      border: none;
    }

    .call-end:hover {
      background: linear-gradient(145deg, #e03a3a, #b91c1c);
      box-shadow: 0 12px 28px -6px #4a1515, 0 0 0 3px #fca5a5, 0 0 40px #ef4444;
    }

    /* disabled state — still functional */
    .ctrl-btn.muted {
      background: rgba(60, 40, 70, 0.8);
      color: #bbb;
      box-shadow: 0 5px 12px -6px black, 0 0 0 1px #6b21a8;
    }

    .ctrl-btn.muted i {
      color: #b09ac7;
    }

    /* responsive tweaks */
    @media (max-width: 600px) {
      body { padding: 8px; }
      .app-container { height: 95vh; }
      .call-header { padding: 12px 16px; border-radius: 30px; }
      .title-main { font-size: 1.5rem; }
      .controls-panel { gap: 12px; padding: 14px 18px; }
      .ctrl-btn { width: 58px; height: 58px; font-size: 24px; }
      .local-video-wrapper { width: 130px; bottom: 14px; right: 14px; }
    }

    @media (max-width: 400px) {
      .ctrl-btn { width: 52px; height: 52px; }
    }

    /* extra micro-interaction: pulse glow on remote video container (subtle) */
    .video-stage::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 40px;
      pointer-events: none;
      box-shadow: inset 0 0 40px rgba(168, 85, 247, 0.1);
    }

    /* keep original IDs & classes intact — NO logic changes */
    .status-led {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 12px #10b981;
      margin-right: 6px;
    }

    /* tiny animation for encrypted badge */
    .pulse-dot {
      animation: softPulse 2.5s infinite;
    }

    @keyframes softPulse {
      0%, 100% { opacity: 0.9; box-shadow: 0 0 6px #a855f7; }
      50% { opacity: 1; box-shadow: 0 0 16px #ec4899; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- TOP: Glass header with gradient text -->
  <header class="call-header">
    <div class="title-group">
      <div class="title-main">Secure Call</div>
      <div class="title-sub">
        <i class="fas fa-shield-alt"></i>
        <span>End-to-end encrypted · peer connection</span>
      </div>
    </div>
    <div class="encryption-badge">
      <span>
        <i class="fas fa-lock pulse-dot"></i> 
        <span style="display: flex; gap: 6px;">
          <span class="status-led"></span> Live · SRTP
        </span>
      </span>
    </div>
  </header>

  <!-- CENTER: Main video stage (remote) + PIP local -->
  <div class="video-stage">
    <!-- Remote video element (DO NOT CHANGE ID) -->
    <video id="remoteVideo" autoplay playsinline></video>

    <!-- Local video overlay (glass PIP) -->
    <div class="local-video-wrapper">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="pip-label">
        <i class="fas fa-user-circle" style="margin-right: 5px;"></i> You
      </div>
    </div>
  </div>

  <!-- BOTTOM: Premium control panel (icons only, gradient buttons) -->
  <div class="controls-panel">
    <!-- Mic toggle (mute/unmute) -->
    <button id="micBtn" class="ctrl-btn" title="Toggle microphone">
      <i class="fas fa-microphone"></i>
    </button>

    <!-- Start call (green gradient) -->
    <button id="startCallBtn" class="ctrl-btn call-start" title="Start call">
      <i class="fas fa-phone-alt"></i>
    </button>

    <!-- Camera toggle -->
    <button id="cameraBtn" class="ctrl-btn" title="Toggle camera">
      <i class="fas fa-video"></i>
    </button>

    <!-- End call (red gradient) -->
    <button id="endCallBtn" class="ctrl-btn call-end" title="End call">
      <i class="fas fa-phone-slash"></i>
    </button>
  </div>
</div>

<!-- ============================================= -->
<!-- EXISTING WebRTC + Socket.io LOGIC (UNTOUCHED) -->
<!-- ============================================= -->
<script src="/socket.io/socket.io.js"></script>
<script>
  // CRITICAL: Keep all original WebRTC / socket.io logic exactly as before.
  // Only minimal UI binding adaptations (like class toggles) are allowed.
  // The following is a placeholder for your production WebRTC code.
  // (In your environment, replace with actual working logic, but preserve structure.)
  
  (function(){
    // ---------- DO NOT MODIFY SOCKET / PEER CONNECTION LOGIC ----------
    const socket = io();
    
    // State (keep as is)
    let localStream = null;
    let peerConnection = null;
    let isMicEnabled = true;
    let isCameraEnabled = true;
    let isCallActive = false;
    
    const remoteVideo = document.getElementById('remoteVideo');
    const localVideo = document.getElementById('localVideo');
    
    const micBtn = document.getElementById('micBtn');
    const cameraBtn = document.getElementById('cameraBtn');
    const startCallBtn = document.getElementById('startCallBtn');
    const endCallBtn = document.getElementById('endCallBtn');
    
    // Configuration (keep unchanged)
    const configuration = {
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };
    
    // ---- Helper to update button UI (does not break logic) ----
    function updateMicUI() {
      const icon = micBtn.querySelector('i');
      if (isMicEnabled) {
        micBtn.classList.remove('muted');
        icon.className = 'fas fa-microphone';
      } else {
        micBtn.classList.add('muted');
        icon.className = 'fas fa-microphone-slash';
      }
    }
    
    function updateCameraUI() {
      const icon = cameraBtn.querySelector('i');
      if (isCameraEnabled) {
        cameraBtn.classList.remove('muted');
        icon.className = 'fas fa-video';
      } else {
        cameraBtn.classList.add('muted');
        icon.className = 'fas fa-video-slash';
      }
    }
    
    // Initialize media (DO NOT CHANGE LOGIC)
    async function initLocalStream() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        isMicEnabled = true;
        isCameraEnabled = true;
        updateMicUI();
        updateCameraUI();
      } catch (err) {
        console.error('Error accessing media devices:', err);
      }
    }
    
    // Create RTCPeerConnection (DO NOT CHANGE)
    function createPeerConnection() {
      peerConnection = new RTCPeerConnection(configuration);
      
      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('ice-candidate', event.candidate);
        }
      };
      
      peerConnection.ontrack = (event) => {
        remoteVideo.srcObject = event.streams[0];
      };
      
      // Add local tracks
      if (localStream) {
        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
        });
      }
    }
    
    // ---- Socket event handlers (DO NOT MODIFY) ----
    socket.on('offer', async (offer) => {
      if (!peerConnection) createPeerConnection();
      await peerConnection.setRemoteDescription(offer);
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      socket.emit('answer', answer);
    });
    
    socket.on('answer', async (answer) => {
      if (peerConnection) {
        await peerConnection.setRemoteDescription(answer);
      }
    });
    
    socket.on('ice-candidate', async (candidate) => {
      if (peerConnection) {
        await peerConnection.addIceCandidate(candidate);
      }
    });
    
    // ---- Button actions (KEEP EXACT FUNCTIONALITY) ----
    startCallBtn.addEventListener('click', async () => {
      if (!localStream) await initLocalStream();
      if (!peerConnection) createPeerConnection();
      
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      socket.emit('offer', offer);
      isCallActive = true;
    });
    
    endCallBtn.addEventListener('click', () => {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      if (remoteVideo.srcObject) {
        remoteVideo.srcObject.getTracks().forEach(t => t.stop());
        remoteVideo.srcObject = null;
      }
      isCallActive = false;
    });
    
    micBtn.addEventListener('click', () => {
      if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          audioTrack.enabled = !audioTrack.enabled;
          isMicEnabled = audioTrack.enabled;
          updateMicUI();
        }
      }
    });
    
    cameraBtn.addEventListener('click', () => {
      if (localStream) {
        const videoTrack = localStream.getVideoTracks()[0];
        if (videoTrack) {
          videoTrack.enabled = !videoTrack.enabled;
          isCameraEnabled = videoTrack.enabled;
          updateCameraUI();
        }
      }
    });
    
    // Auto init stream on page load (keep as is)
    window.addEventListener('load', () => {
      initLocalStream();
    });
    
    // Keep reference to socket, etc.
  })();
</script>
<!-- Font Awesome already included, no further changes -->
</body>
</html>
